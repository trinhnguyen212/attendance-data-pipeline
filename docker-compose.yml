version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: attendance_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d

  app:
    build: .
    container_name: pipeline_app
    depends_on:
      - db
    env_file:
      - .env.docker
    environment:
      - DB_HOST=db
      - PYTHONPATH=/app  # <--- Add this line
    volumes:
      - .:/app

volumes:
  db_data:
